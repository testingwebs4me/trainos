<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trainos Coach</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#060606">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainos Coach">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #060608;
  --card: #101114;
  --card-hover: #161820;
  --border: #1c1e24;
  --accent: #47a0ff;
  --accent-dim: #326eb8;
  --accent-glow: rgba(71,160,255,0.12);
  --text: #f0f0f0;
  --muted: #555;
  --radius: 14px;
  --ease: cubic-bezier(0.16,1,0.3,1);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100dvh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.4; }
.container { max-width: 700px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

/* AUTH */
.auth-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.auth-screen.hidden { display: none; }
.auth-inner { text-align: center; padding: 40px 24px; width: 100%; max-width: 380px; }
.lock-icon { width: 56px; height: 56px; margin: 0 auto 20px; border: 2px solid #1a2040; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); animation: lockPulse 2s ease-in-out infinite; }
@keyframes lockPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(71,160,255,0.15); } 50% { box-shadow: 0 0 0 16px rgba(71,160,255,0); } }
.lock-icon svg { width: 24px; height: 24px; }
.auth-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.06em; margin-bottom: 6px; }
.auth-title span { color: var(--accent); }
.auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 300; }
.google-btn { display: inline-flex; align-items: center; gap: 12px; background: #fff; color: #333; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; padding: 14px 32px; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s var(--ease); touch-action: manipulation; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
.google-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.google-btn:active { transform: scale(0.97); }
.google-btn .google-icon { width: 20px; height: 20px; flex-shrink: 0; }
.google-btn.signing-in { opacity: 0.5; pointer-events: none; }
.sign-in-error { font-size: 12px; color: #ff4444; margin-top: 16px; min-height: 18px; }

/* TOP NAV */
.top-nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 0; position: relative; z-index: 1; }
.nav-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
.nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-glow); border: 1px solid rgba(71,160,255,0.2); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--accent); flex-shrink: 0; overflow: hidden; }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.nav-user-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.nav-switch { background: none; border: 1px solid #2a2a2a; border-radius: 6px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; flex-shrink: 0; }
.nav-switch:hover { border-color: #444; color: var(--text); }

/* HEADER */
header { padding: 28px 0 24px; text-align: center; }
.header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 12px; display: inline-flex; align-items: center; gap: 8px; }
.header-eyebrow::before,.header-eyebrow::after { content: ''; width: 20px; height: 1px; background: var(--accent-dim); opacity: 0.4; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px,10vw,72px); line-height: 0.9; letter-spacing: 0.02em; }
h1 span { color: var(--accent); }

/* INVITE SECTION */
.invite-bar { display: flex; gap: 8px; margin-bottom: 24px; }
.btn-invite { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(71,160,255,0.25); background: var(--accent-glow); color: var(--accent); cursor: pointer; transition: all 0.2s; touch-action: manipulation; text-align: center; }
.btn-invite:hover { background: rgba(71,160,255,0.18); border-color: var(--accent); }
.btn-invite:active { transform: scale(0.97); }

/* INVITE MODAL */
.modal-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 90%; max-width: 360px; text-align: center; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.05em; margin-bottom: 6px; }
.modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.invite-code-display { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.2em; color: var(--accent); background: rgba(71,160,255,0.06); border: 1.5px dashed rgba(71,160,255,0.3); border-radius: 14px; padding: 16px; margin-bottom: 16px; user-select: all; }
.btn-copy { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 24px; border-radius: 10px; border: none; background: var(--accent); color: var(--bg); cursor: pointer; transition: all 0.2s; touch-action: manipulation; margin-bottom: 8px; }
.btn-copy:active { transform: scale(0.96); }
.btn-close-modal { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 16px; touch-action: manipulation; }
.btn-close-modal:hover { color: var(--text); }

/* USER ROSTER */
.roster-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.roster-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
.roster-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
.roster-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(71,160,255,0.06); }
.roster-card:active { transform: scale(0.98); }
.roster-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent-glow); border: 1px solid rgba(71,160,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); flex-shrink: 0; overflow: hidden; }
.roster-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.roster-info { flex: 1; min-width: 0; }
.roster-name { font-size: 14px; font-weight: 600; }
.roster-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.roster-arrow { color: #333; font-size: 18px; flex-shrink: 0; }
.roster-week { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); flex-shrink: 0; }
.roster-empty { text-align: center; padding: 60px 20px; border: 1px dashed var(--border); border-radius: 20px; }
.roster-empty-icon { font-size: 48px; margin-bottom: 16px; display: block; }
.roster-empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #2a2a2a; }
.roster-empty p { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* MANAGE USER VIEW */
#manageView { display: none; }
.manage-back { background: none; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; touch-action: manipulation; }
.manage-back:hover { border-color: #444; color: var(--text); }
.manage-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 0; }
.manage-user-name { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.manage-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(30px,7vw,48px); letter-spacing: 0.03em; padding: 16px 0 4px; }
.manage-title span { color: var(--accent); }

/* DAYS GRID — reused from main app */
.days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin: 20px 0 16px; }
@media (max-width: 600px) { .days-grid { gap: 4px; } }
.day-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 4px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
.day-btn:active { transform: scale(0.96); }
.day-btn:hover { border-color: #333; background: var(--card-hover); }
.day-btn.active { border-color: var(--accent); background: linear-gradient(135deg,#0a1020,#0c1428); box-shadow: 0 0 0 1px var(--accent),0 4px 24px rgba(71,160,255,0.08); }
.day-btn.active .day-name { color: var(--accent); }
.day-btn.is-rest { opacity: 0.35; }
.day-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(16px,3.5vw,22px); letter-spacing: 0.05em; display: block; line-height: 1; }
.day-tag { font-size: clamp(7px,1.6vw,9px); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-top: 5px; line-height: 1.25; min-height: 22px; }
.day-btn.active .day-tag { color: var(--accent-dim); }
.day-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin: 6px auto 0; opacity: 0; transition: opacity 0.2s; }
.day-btn.active .day-dot { opacity: 1; }
.day-check { position: absolute; top: 5px; right: 5px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); color: var(--bg); display: none; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
.day-btn.completed .day-check { display: flex; }

/* WEEK PROGRESS */
.week-progress { margin: 16px 0 24px; padding: 14px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label span { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.progress-label strong { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 0.04em; }
.progress-track { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),#2070cc); border-radius: 3px; transition: width 0.6s var(--ease); width: 0; }

/* EXERCISE CARDS (read-only for coach) */
.exercise-list { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 10px; }
@media (max-width: 600px) { .exercise-list { grid-template-columns: 1fr; } }
.exercise-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s; animation: itemIn 0.45s var(--ease) both; }
@keyframes itemIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
.exercise-item.checked-ex { border-color: rgba(71,160,255,0.2); background: linear-gradient(135deg,#0a0e14,#0c1018); }
.exercise-item.checked-ex .ex-name { text-decoration: line-through; text-decoration-color: #333; color: var(--muted); }
.ex-img-wrap { width: 100%; aspect-ratio: 16/10; background: #0a0a0a; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
.ex-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #1e1e1e; }
.img-placeholder svg { width: 36px; height: 36px; }
.img-placeholder span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
.ex-body { padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #222; min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 1.5px solid #222; border-radius: 50%; flex-shrink: 0; }
.exercise-item.checked-ex .ex-number { background: var(--accent); border-color: var(--accent); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.ex-sets-label { font-size: 10px; color: var(--muted); margin-top: 3px; }
.ex-badge { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; }

/* SET LOG DISPLAY (read-only for coach) */
.set-log-area { border-top: 1px solid #161616; padding: 8px 12px 10px; }
.set-last-session { font-size: 10px; color: var(--muted); padding: 0 2px 4px; font-weight: 500; }
.set-last-session span { color: var(--accent-dim); font-weight: 600; }
.set-rows { display: flex; flex-direction: column; gap: 4px; }
.set-row-display { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 0; }
.set-row-display .set-label { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--accent); min-width: 22px; }
.set-row-display .set-data { color: var(--text); font-weight: 500; }
.set-row-display .set-data.empty { color: #333; font-style: italic; font-weight: 400; }

/* PANEL ACTIONS */
.panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
.panel-day-wrap { display: flex; flex-direction: column; gap: 2px; }
.panel-day { font-family: 'Bebas Neue', sans-serif; font-size: clamp(30px,7vw,48px); letter-spacing: 0.03em; line-height: 1; }
.panel-focus { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(71,160,255,0.25); border-radius: 999px; white-space: nowrap; background: var(--accent-glow); }
.btn-edit-day { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(71,160,255,0.25); background: var(--accent-glow); color: var(--accent); transition: all 0.2s; touch-action: manipulation; }
.btn-edit-day:hover { background: rgba(71,160,255,0.18); border-color: var(--accent); }
.btn-rest-toggle { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; }
.btn-rest-toggle:hover { border-color: #555; color: var(--text); }
.btn-rest-toggle.is-rest { background: rgba(255,170,0,0.08); border-color: rgba(255,170,0,0.3); color: #ffaa00; }

/* REST PANEL */
.rest-panel { text-align: center; padding: 60px 20px; border: 1px dashed #1a1a1a; border-radius: 20px; }
.rest-emoji { font-size: 48px; margin-bottom: 16px; display: block; }
.rest-panel h2 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.05em; color: #2a2a2a; }
.rest-panel p { color: var(--muted); font-size: 13px; margin-top: 8px; }
.rest-panel .btn-unrest { margin-top: 24px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 24px; border-radius: 10px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; }

/* STATS */
.stats-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
.stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 11px; color: var(--muted); font-weight: 500; flex: 1; min-width: 80px; }
.stat-chip span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text); line-height: 1.1; }

/* UNLINK */
.btn-unlink { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; margin-top: 32px; }
.btn-unlink:hover { border-color: #ff4444; color: #ff4444; }

/* EDIT BOTTOM SHEET — same as main app */
#editSheet { position: fixed; inset: 0; z-index: 8888; pointer-events: none; }
#editSheet.open { pointer-events: all; }
#editBackdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.65); opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(3px); }
#editSheet.open #editBackdrop { opacity: 1; }
#editPanel { position: absolute; bottom: 0; left: 0; right: 0; background: #0d0d0d; border-top: 1px solid #222; border-radius: 20px 20px 0 0; max-height: 92dvh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s var(--ease); padding-bottom: env(safe-area-inset-bottom, 0px); }
#editSheet.open #editPanel { transform: translateY(0); }
.edit-drag-bar { width: 36px; height: 4px; background: #2a2a2a; border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; cursor: grab; touch-action: none; }
.edit-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 12px; flex-shrink: 0; border-bottom: 1px solid #161616; }
.edit-header-left { display: flex; flex-direction: column; gap: 2px; }
.edit-day-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; color: var(--text); line-height: 1; }
.edit-focus-input { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; outline: none; width: 100%; max-width: 240px; transition: border-color 0.2s; margin-top: 4px; }
.edit-focus-input:focus { border-color: var(--accent); }
.edit-save-btn { background: var(--accent); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 22px; border-radius: 10px; border: none; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
.edit-save-btn:active { transform: scale(0.96); }
.edit-save-btn.saving { opacity: 0.5; pointer-events: none; }
.edit-body { overflow-y: auto; flex: 1; padding: 16px 16px 24px; -webkit-overflow-scrolling: touch; }
.edit-body::-webkit-scrollbar { width: 0; }
.edit-section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
.edit-section-label:first-child { margin-top: 4px; }
.edit-ex-list { display: flex; flex-direction: column; gap: 6px; min-height: 50px; }
.edit-ex-item { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 10px; user-select: none; }
.edit-ex-item.is-dragging { box-shadow: 0 8px 32px rgba(0,0,0,0.7); border-color: var(--accent); opacity: 0.92; transform: scale(1.02); z-index: 10; position: relative; }
.drag-handle { color: #444; flex-shrink: 0; cursor: grab; padding: 10px 8px; display: flex; flex-direction: column; gap: 3px; touch-action: none; align-self: stretch; justify-content: center; min-width: 32px; }
.drag-handle span { display: block; width: 18px; height: 2.5px; background: currentColor; border-radius: 1px; }
.drag-handle:active { color: #888; cursor: grabbing; }
.edit-ex-info { flex: 1; min-width: 0; }
.edit-ex-name { font-size: 12px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

async function handleSignedIn(user) {
  currentUser = { id: user.uid, name: user.displayName || user.email?.split('@')[0] || 'Coach', initials: (user.displayName||'C')[0].toUpperCase(), photoURL: user.photoURL };
  // Load or create coach doc
  const snap = await getDoc(doc(db, COL_COACHES, currentUser.id));
  if (snap.exists()) { coachData = snap.data(); }

    coachData = { coachId: currentUser.id, coachName: currentUser.name, coachEmail: user.email, coachPhoto: currentUser.photoURL, users: [], createdAt: serverTimestamp() };

}

async function openUserManagement(userInfo) {
  selectedUser = userInfo;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('manageView').style.display = 'block';
  document.getElementById('manageUserName').innerHTML = `${userInfo.userPhoto ? `<div class="nav-avatar"><img src="${userInfo.userPhoto}"></div>` : ''} ${userInfo.userName}`;
  document.getElementById('manageTitle').innerHTML = `${userInfo.userName.split(' ')[0]}'s <span>TRAINING</span>`;

  // Load user data
  try {
    const planSnap = await getDoc(doc(db, COL_PLANS, userInfo.userId));
    selectedUserPlan = planSnap.exists() ? planSnap.data() : getDefaultPlan();
  } catch(e) { selectedUserPlan = getDefaultPlan(); }

  try {
    const restSnap = await getDoc(doc(db, COL_REST, userInfo.userId));
    selectedUserRest = restSnap.exists() ? restSnap.data() : {};
  } catch(e) { selectedUserRest = {}; }

  try {
    const wid = getWeekId();
    const trackSnap = await getDoc(doc(db, COL_TRACK, `${userInfo.userId}_${wid}`));
    selectedUserTracking = trackSnap.exists() ? trackSnap.data() : { completed:{}, exercises:{} };
  } catch(e) { selectedUserTracking = { completed:{}, exercises:{} }; }

  try {
    const setQ = query(collection(db, COL_SETS), where('userId','==',userInfo.userId));
    const setSnap = await getDocs(setQ);
    selectedUserSetLogs = setSnap.docs.map(d => ({id:d.id,...d.data()}));
    selectedUserSetLogs.sort((a,b) => (b.date?.seconds??0)-(a.date?.seconds??0));
  } catch(e) { selectedUserSetLogs = []; }

  renderManageView();
}

function renderManageView() {
  // Days grid
  const grid = document.getElementById('manageDaysGrid');
  grid.innerHTML = '';
  days.forEach(day => {
    const rest = isRestDay(day);
    const exs = selectedUserPlan[day] || [];
    const completed = selectedUserTracking.completed?.[day] === true;
    const tag = rest ? 'Rest' : (exs.length > 0 ? getDayFocus(day).split(/[,&]/)[0].trim() : 'Empty');
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (rest?' is-rest':'') + (completed?' completed':'') + (currentDay===day?' active':'');
    btn.dataset.day = day;
    btn.innerHTML = `<span class="day-name">${short[day]}</span><span class="day-tag">${tag}</span><div class="day-dot"></div><div class="day-check">\u2713</div>`;
    btn.addEventListener('click', () => selectDay(day));
    grid.appendChild(btn);
  });

  // Progress bar
  const td = days.filter(d => !isRestDay(d));
  const done = td.filter(d => selectedUserTracking.completed?.[d]).length;
  const total = td.length || 1;
  document.getElementById('manageProgressText').textContent = `${done} / ${td.length}`;
  document.getElementById('manageProgressFill').style.width = `${(done/total)*100}%`;

  // Select today or first training day
  const todayIdx = new Date().getDay();
  const todayName = days[todayIdx];
  if (!isRestDay(todayName)) selectDay(todayName);
  else { for (let i=1;i<=7;i++) { const next=days[(todayIdx+i)%7]; if (!isRestDay(next)) { selectDay(next); break; } } }
}

function selectDay(day) {
  document.querySelectorAll('#manageDaysGrid .day-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#manageDaysGrid [data-day="${day}"]`)?.classList.add('active');
  currentDay = day;
  const display = document.getElementById('manageWorkoutDisplay');

  if (isRestDay(day)) {
    display.innerHTML = `<div class="rest-panel"><span class="rest-emoji">\uD83D\uDCA4</span><h2>Rest Day</h2><p>This day is marked as rest</p><button class="btn-unrest" id="btnUnrest">Remove Rest Day</button></div>`;
    document.getElementById('btnUnrest').addEventListener('click', async () => { delete selectedUserRest[day]; await setDoc(doc(db,COL_REST,selectedUser.userId),selectedUserRest); renderManageView(); });
    return;
  }

  const exs = selectedUserPlan[day] || [];
  const focus = getDayFocus(day);

  if (!exs.length) {
    display.innerHTML = `<div class="panel-header"><div class="panel-day-wrap"><div class="panel-day">${day}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;"><div class="panel-focus">${focus}</div><button class="btn-edit-day" id="btnEdit">+ Add Exercises</button><button class="btn-rest-toggle" id="btnRestToggle">Set Rest Day</button></div></div><div class="rest-panel" style="border:1px dashed #1e1e1e;"><span class="rest-emoji">\uD83D\uDCAA</span><h2 style="color:#333;">No Exercises Yet</h2><p>Add exercises for this user</p></div>`;
    document.getElementById('btnEdit').addEventListener('click', () => openEditSheet(day));
    document.getElementById('btnRestToggle').addEventListener('click', async () => { selectedUserRest[day]=true; await setDoc(doc(db,COL_REST,selectedUser.userId),selectedUserRest); renderManageView(); });
    return;
  }

  const totalSets = exs.reduce((s,e)=>s+parseInt(e.sets||0),0);

  display.innerHTML = `<div class="panel-header"><div class="panel-day-wrap"><div class="panel-day">${day}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"><div class="panel-focus">${focus}</div><button class="btn-edit-day" id="btnEdit">Edit Plan</button><button class="btn-rest-toggle" id="btnRestToggle">Set Rest Day</button></div></div><div class="exercise-list" id="exList"></div><div class="stats-row"><div class="stat-chip"><span>${exs.length}</span>Exercises</div><div class="stat-chip"><span>${totalSets}</span>Total Sets</div></div>`;

  document.getElementById('btnEdit').addEventListener('click', () => openEditSheet(day));
  document.getElementById('btnRestToggle').addEventListener('click', async () => { selectedUserRest[day]=true; await setDoc(doc(db,COL_REST,selectedUser.userId),selectedUserRest); renderManageView(); });

  const list = document.getElementById('exList');
  const wid = getWeekId();
  exs.forEach((ex, i) => {
    const checked = selectedUserTracking.exercises?.[`${day}-${ex.id}`] === true;
    const todaySets = selectedUserSetLogs.filter(l => l.exerciseName===ex.name && l.day===day && l.weekId===wid).sort((a,b)=>(a.setNumber||1)-(b.setNumber||1));
    const numSets = parseInt(ex.sets)||3;

    let setsHTML = '';
    for (let s=1; s<=numSets; s++) {
      const logged = todaySets.find(t => t.setNumber===s);
      setsHTML += `<div class="set-row-display"><div class="set-label">S${s}</div><div class="set-data ${logged?'':'empty'}">${logged ? `${logged.weight}kg \u00D7 ${logged.reps}` : 'Not logged'}</div></div>`;
    }

    const card = document.createElement('div');
    card.className = 'exercise-item' + (checked?' checked-ex':'');
    card.style.animationDelay = (0.03+i*0.03)+'s';
    const imgUrl = imageMap[ex.search] || null;
    card.innerHTML = `
      <div class="ex-img-wrap">${imgUrl ? `<img src="${imgUrl}" alt="${ex.name}">` : placeholderHTML}</div>
      <div class="ex-body">
        <span class="ex-number">${checked?'\u2713':String(i+1).padStart(2,'0')}</span>
        <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-sets-label">${ex.sets} sets \u00D7 ${ex.reps}</div></div>
        <div class="ex-badge">${ex.sets}\u00D7${ex.reps}</div>
      </div>
      <div class="set-log-area"><div class="set-rows">${setsHTML}</div></div>`;
    list.appendChild(card);
  });
}

const editDragBar = document.getElementById('editDragBar');
let sheetStartY = 0;
editDragBar.addEventListener('touchstart', e => { sheetStartY=e.touches[0].clientY; editPanel.style.transition='none'; }, {passive:true});
editDragBar.addEventListener('touchmove', e => { editPanel.style.transform=`translateY(${Math.max(0,e.touches[0].clientY-sheetStartY)}px)`; }, {passive:true});
editDragBar.addEventListener('touchend', e => { editPanel.style.transition=''; if (e.changedTouches[0].clientY-sheetStartY>100) { closeEditSheet(); editPanel.style.transform=''; } else editPanel.style.transform=''; });

function renderEditList() {
  const listEl = document.getElementById('editExList');
  listEl.innerHTML = '';
  if (!editPlanCopy.length) { listEl.innerHTML = `<div class="edit-empty">No exercises yet \u2014 add some below \u2193</div>`; return; }
  editPlanCopy.forEach((ex, i) => {
    const item = document.createElement('div');
    item.className = 'edit-ex-item'; item.dataset.idx = i;
    item.innerHTML = `<div class="drag-handle"><span></span><span></span><span></span></div><div class="edit-ex-info"><div class="edit-ex-name">${ex.name}</div><div class="edit-ex-cat">${ex.category}</div></div><div class="edit-ex-controls"><div class="sets-stepper"><button class="sets-btn" data-action="dec">\u2212</button><div class="sets-val">${ex.sets}</div><button class="sets-btn" data-action="inc">+</button></div><span style="font-size:11px;color:var(--muted);">\u00D7</span><input class="reps-input" value="${ex.reps}" placeholder="reps"></div><button class="edit-ex-x">\u2715</button>`;
    item.querySelectorAll('.sets-btn').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); const idx=parseInt(item.dataset.idx); let s=parseInt(editPlanCopy[idx].sets)||3; if(btn.dataset.action==='inc'&&s<8)s++; else if(btn.dataset.action==='dec'&&s>1)s--; editPlanCopy[idx].sets=String(s); item.querySelector('.sets-val').textContent=s; });
    });
    item.querySelector('.reps-input').addEventListener('input', e => { editPlanCopy[parseInt(item.dataset.idx)].reps=e.target.value; });
    item.querySelector('.edit-ex-x').addEventListener('click', e => { e.stopPropagation(); const exRef=editPlanCopy[parseInt(item.dataset.idx)]; const ri=editPlanCopy.indexOf(exRef); if(ri!==-1)editPlanCopy.splice(ri,1); renderEditList(); renderLibrary(); });
    listEl.appendChild(item);
  });
  initDragSort(listEl);
}

function initDragSort(listEl) {
  let dragEl = null, holdTimer = null, isDragging = false, startY = 0;
  const HOLD_MS = 200;
  function getItems() { return [...listEl.querySelectorAll('.edit-ex-item')]; }
  function targetSlot(y) {
    for (const item of getItems().filter(el => el !== dragEl)) { const r = item.getBoundingClientRect(); if (y < r.top + r.height/2) return { before: item }; }
    return { before: null };
  }
  function startDrag(target, y) {
    dragEl = target; isDragging = true; startY = y;
    dragEl.classList.add('is-dragging');
    const eb = document.querySelector('.edit-body'); if (eb) eb.style.overflow = 'hidden';
    if (navigator.vibrate) navigator.vibrate(30);
  }
  function moveDrag(y) {
    if (!isDragging || !dragEl) return;
    const { before } = targetSlot(y);
    if (before) { if (dragEl.nextSibling !== before) listEl.insertBefore(dragEl, before); }
    else { if (listEl.lastElementChild !== dragEl) listEl.appendChild(dragEl); }
  }
  function endDrag() {
    clearTimeout(holdTimer); holdTimer = null;
    if (!isDragging || !dragEl) { isDragging = false; dragEl = null; return; }
    dragEl.classList.remove('is-dragging');
    const eb = document.querySelector('.edit-body'); if (eb) eb.style.overflow = '';
    const newOrder = [];
    getItems().forEach(item => { const i = parseInt(item.dataset.idx); if (!isNaN(i) && editPlanCopy[i]) newOrder.push({...editPlanCopy[i]}); });
    editPlanCopy.length = 0; newOrder.forEach(ex => editPlanCopy.push(ex));
    dragEl = null; isDragging = false; renderEditList();
  }
  function cancelDrag() { clearTimeout(holdTimer); holdTimer=null; if(dragEl)dragEl.classList.remove('is-dragging'); const eb=document.querySelector('.edit-body'); if(eb)eb.style.overflow=''; dragEl=null; isDragging=false; renderEditList(); }
  // TOUCH
  listEl.addEventListener('touchstart', e => {
    if (dragEl) return; if (!e.target.closest('.drag-handle')) return;
    const target = e.target.closest('.edit-ex-item'); if (!target) return;
    startY = e.touches[0].clientY;
    holdTimer = setTimeout(() => startDrag(target, startY), HOLD_MS);
  }, { passive: true });
  listEl.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY;
    if (!isDragging && holdTimer) { if (Math.abs(y-startY)>10) { clearTimeout(holdTimer); holdTimer=null; } return; }
    if (!isDragging) return; e.preventDefault(); moveDrag(y);
  }, { passive: false });
  listEl.addEventListener('touchend', endDrag);
  listEl.addEventListener('touchcancel', cancelDrag);
  // MOUSE
  listEl.addEventListener('mousedown', e => {
    if (dragEl) return; if (!e.target.closest('.drag-handle')) return;
    const target = e.target.closest('.edit-ex-item'); if (!target) return;
    e.preventDefault(); startDrag(target, e.clientY);
  });
  document.addEventListener('mousemove', e => { if (isDragging) { e.preventDefault(); moveDrag(e.clientY); } });
  document.addEventListener('mouseup', () => { if (isDragging) endDrag(); });
}

function renderCatTabs() {
  const allCats=['Chest','Back','Shoulders','Legs','Arms','Abs','Glutes','Cardio'];
  const dayCats=DAY_CATEGORIES[editingDay]||allCats;
  const ordered=[...dayCats,...allCats.filter(c=>!dayCats.includes(c))];
  const tabsEl=document.getElementById('editCatTabs'); tabsEl.innerHTML='';
  ordered.forEach(cat => {
    const btn=document.createElement('button');
    btn.className='edit-cat-tab'+(cat===activeCatTab?' active':'');
    btn.textContent=cat;
    btn.addEventListener('click', () => { activeCatTab=cat; tabsEl.querySelectorAll('.edit-cat-tab').forEach(t=>t.classList.toggle('active',t.textContent===cat)); renderLibrary(); });
    tabsEl.appendChild(btn);
  });
}

function renderLibrary() {
  const libEl=document.getElementById('editLibrary'); libEl.innerHTML='';
  const addedIds=new Set(editPlanCopy.map(e=>e.id));
  exerciseLibrary.filter(e=>e.category===activeCatTab).forEach(ex => {
    const item=document.createElement('div');
    item.className='lib-item'+(addedIds.has(ex.id)?' already-added':'');
    item.innerHTML=`<div class="lib-item-info"><div class="lib-item-name">${ex.name}</div><div class="lib-item-cat">${ex.category}</div></div><div class="lib-item-plus">${addedIds.has(ex.id)?'\u2713':'+'}</div>`;
    if(!addedIds.has(ex.id)) {
      item.addEventListener('click', () => { const def=CAT_DEFAULTS[ex.category]||{sets:'3',reps:'10\u201312'}; editPlanCopy.push({id:ex.id,name:ex.name,search:ex.search,category:ex.category,sets:def.sets,reps:def.reps}); renderEditList(); renderLibrary(); });
    }
    libEl.appendChild(item);
  });
}
</script>
