<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Training Week v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060606;
    --card: #111111;
    --card-hover: #161616;
    --border: #1c1c1c;
    --accent: #e8ff47;
    --accent-dim: #a8b832;
    --text: #f0f0f0;
    --muted: #555;
    --radius: 14px;
    --ease: cubic-bezier(0.16,1,0.3,1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh; overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  /* AUTH SCREENS */
  .auth-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-screen.hidden { display: none; }

  .auth-inner {
    text-align: center; padding: 40px 24px;
    width: 100%; max-width: 380px;
  }

  .user-select-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.06em; margin-bottom: 6px; }
  .user-select-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; font-weight: 300; }
  .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .user-btn {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 22px 16px;
    cursor: pointer; transition: all 0.2s var(--ease);
    -webkit-user-select: none; user-select: none; touch-action: manipulation;
  }
  .user-btn:hover { border-color: var(--accent); background: linear-gradient(135deg,#1a1c0a,#12130a); transform: translateY(-2px); box-shadow: 0 0 0 1px var(--accent),0 4px 24px rgba(232,255,71,0.08); }
  .user-btn:active { transform: scale(0.97); }
  .user-btn-avatar { width: 44px; height: 44px; border-radius: 50%; background: #141414; border: 1.5px solid #252525; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }
  .user-btn-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }

  .pin-screen-top { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; position: relative; }
  .back-btn { position: absolute; left: 0; background: none; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 12px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
  .back-btn:hover { border-color: #444; color: var(--text); }

  .lock-icon { width: 56px; height: 56px; margin: 0 auto 20px; border: 2px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); animation: lockPulse 2s ease-in-out infinite; }
  @keyframes lockPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.15); } 50% { box-shadow: 0 0 0 16px rgba(232,255,71,0); } }
  .lock-icon svg { width: 24px; height: 24px; }
  .lock-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.06em; margin-bottom: 4px; }
  .lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; font-weight: 300; }

  .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
  .pin-dot { width: 14px; height: 14px; border: 2px solid #2a2a2a; border-radius: 50%; transition: all 0.2s ease; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(232,255,71,0.35); }
  .pin-dot.error { border-color: #ff4444; background: #ff4444; box-shadow: 0 0 12px rgba(255,68,68,0.35); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-6px); } 75% { transform:translateX(6px); } }

  .pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 260px; margin: 0 auto; }
  .pin-key { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.04em; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 16px; cursor: pointer; transition: all 0.15s ease; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  .pin-key:active { background: #1a1a1a; transform: scale(0.95); }
  .pin-key.accent { color: var(--accent); border-color: #2a2a0a; }
  .pin-key.del { font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--muted); }
  .lock-error-msg { font-size: 12px; color: #ff4444; margin-top: 16px; min-height: 18px; letter-spacing: 0.04em; }

  /* TOP NAV */
  .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 0 0; position: relative; z-index: 1; }
  .nav-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
  .nav-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--accent); flex-shrink: 0; }
  .nav-user-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
  .nav-switch { background: none; border: 1px solid #2a2a2a; border-radius: 6px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; flex-shrink: 0; }
  .nav-switch:hover { border-color: #444; color: var(--text); }
  .nav-progress-btn { background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.15); border-radius: 8px; color: var(--accent-dim); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; transition: all 0.2s; touch-action: manipulation; flex-shrink: 0; }
  .nav-progress-btn:hover { background: rgba(232,255,71,0.1); border-color: var(--accent); color: var(--accent); }

  /* MAIN APP */
  #app { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
  #app.visible { opacity: 1; transform: translateY(0); }
  .container { max-width: 960px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

  header { padding: 28px 0 20px; text-align: center; }
  .header-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 12px; display: inline-flex; align-items: center; gap: 8px; }
  .header-eyebrow::before,.header-eyebrow::after { content: ''; width: 20px; height: 1px; background: var(--accent-dim); opacity: 0.4; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px,11vw,90px); line-height: 0.88; letter-spacing: 0.02em; }
  h1 span { color: var(--accent); }
  .header-sub { margin-top: 14px; font-size: 13px; color: var(--muted); font-weight: 300; }
  .today-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 6px 14px; background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.12); border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .today-badge .pulse-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  #db-status { text-align: center; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #333; padding: 6px 0 0; min-height: 18px; transition: opacity 0.5s; }
  #db-status.hidden { opacity: 0; pointer-events: none; }

  /* DAY GRID */
  .days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin: 28px 0 16px; }
  @media (max-width: 600px) { .days-grid { gap: 4px; } }

  .day-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 4px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  .day-btn:active { transform: scale(0.96); }
  .day-btn:hover { border-color: #333; background: var(--card-hover); }
  .day-btn.active { border-color: var(--accent); background: linear-gradient(135deg,#1a1c0a,#12130a); box-shadow: 0 0 0 1px var(--accent),0 4px 24px rgba(232,255,71,0.08); }
  .day-btn.active .day-name { color: var(--accent); }
  .day-btn.is-rest { opacity: 0.35; }
  .day-btn.is-rest .day-tag { color: #444; }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: clamp(16px,3.5vw,22px); letter-spacing: 0.05em; display: block; line-height: 1; }
  .day-tag { font-size: clamp(7px,1.6vw,9px); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-top: 5px; line-height: 1.25; min-height: 22px; }
  .day-btn.active .day-tag { color: var(--accent-dim); }
  .day-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin: 6px auto 0; opacity: 0; transition: opacity 0.2s; }
  .day-btn.active .day-dot { opacity: 1; }
  .day-check { position: absolute; top: 5px; right: 5px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); color: var(--bg); display: none; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
  .day-btn.completed .day-check { display: flex; }

  /* REST DAY BADGE on day button */
  .rest-badge { position: absolute; top: 5px; left: 5px; width: 14px; height: 14px; border-radius: 50%; background: #222; color: #666; display: none; align-items: center; justify-content: center; font-size: 9px; }
  .day-btn.is-rest .rest-badge { display: flex; }

  /* PROGRESS BAR */
  .week-progress { margin: 16px 0 28px; padding: 14px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-label span { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .progress-label strong { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 0.04em; }
  .progress-track { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,var(--accent),#c8dd20); border-radius: 3px; transition: width 0.6s var(--ease); width: 0; }

  .divider { height: 1px; background: linear-gradient(90deg,transparent,var(--border),transparent); margin: 0 0 36px; }

  /* PANEL */
  .workout-panel { display: none; animation: slideIn 0.4s var(--ease); }
  .workout-panel.visible { display: block; }
  @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 10px; }
  .panel-day-wrap { display: flex; flex-direction: column; gap: 2px; }
  .panel-day { font-family: 'Bebas Neue', sans-serif; font-size: clamp(34px,8vw,58px); letter-spacing: 0.03em; line-height: 1; }
  .panel-focus { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(232,255,71,0.25); border-radius: 999px; white-space: nowrap; background: rgba(232,255,71,0.04); }

  .panel-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .panel-actions-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .panel-actions-bottom { display: flex; gap: 6px; }

  .btn-edit-day { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(232,255,71,0.25); background: rgba(232,255,71,0.06); color: var(--accent); transition: all 0.2s; touch-action: manipulation; }
  .btn-edit-day:hover { background: rgba(232,255,71,0.12); border-color: var(--accent); }
  .btn-edit-day:active { transform: scale(0.96); }

  .btn-rest-toggle { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; }
  .btn-rest-toggle:hover { border-color: #555; color: var(--text); }
  .btn-rest-toggle.is-rest { background: rgba(255,170,0,0.08); border-color: rgba(255,170,0,0.3); color: #ffaa00; }

  .btn-complete-all { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; }
  .btn-complete-all:hover { border-color: var(--accent); color: var(--accent); }
  .btn-complete-all.done { background: rgba(232,255,71,0.1); border-color: var(--accent); color: var(--accent); }

  .btn-clear-day { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid #2a2a2a; background: #1a1a1a; color: var(--muted); transition: all 0.2s; touch-action: manipulation; }
  .btn-clear-day:hover { border-color: #ff4444; color: #ff4444; }

  /* EXERCISE CARDS */
  .exercise-list { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 10px; }
  @media (max-width: 600px) { .exercise-list { grid-template-columns: 1fr; } }

  .exercise-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s,transform 0.15s,box-shadow 0.2s; animation: itemIn 0.45s var(--ease) both; position: relative; }
  .exercise-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 0 0 1px rgba(232,255,71,0.15),0 8px 32px rgba(232,255,71,0.05); }
  .exercise-item.checked-ex { border-color: rgba(232,255,71,0.2); background: linear-gradient(135deg,#0f100a,#111); }
  .exercise-item.checked-ex .ex-name { text-decoration: line-through; text-decoration-color: #444; color: var(--muted); }
  .exercise-item.checked-ex .ex-badge,.exercise-item.checked-ex .ex-sets-label,.exercise-item.checked-ex .ex-img-wrap { opacity: 0.35; }

  @keyframes itemIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .exercise-item:nth-child(1) { animation-delay:.03s; }
  .exercise-item:nth-child(2) { animation-delay:.06s; }
  .exercise-item:nth-child(3) { animation-delay:.09s; }
  .exercise-item:nth-child(4) { animation-delay:.12s; }
  .exercise-item:nth-child(5) { animation-delay:.15s; }
  .exercise-item:nth-child(6) { animation-delay:.18s; }
  .exercise-item:nth-child(7) { animation-delay:.21s; }
  .exercise-item:nth-child(8) { animation-delay:.24s; }
  .exercise-item:nth-child(9) { animation-delay:.27s; }

  .ex-img-wrap { width: 100%; aspect-ratio: 16/10; background: #0a0a0a; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
  .ex-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s ease; }
  .exercise-item:hover .ex-img-wrap img { transform: scale(1.06); }
  .img-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #1e1e1e; }
  .img-placeholder svg { width: 36px; height: 36px; }
  .img-placeholder span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; }
  .ex-yt-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; padding: 4px 8px; display: flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #ccc; backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.2s; }
  .ex-yt-badge svg { width: 11px; height: 11px; fill: #ff4444; flex-shrink: 0; }
  .exercise-item:hover .ex-yt-badge { opacity: 1; }
  @media (max-width: 600px) { .ex-yt-badge { opacity: 1; } }

  .spinner { width: 22px; height: 22px; border: 2px solid #1a1a1a; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .img-loading { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .img-loading span { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #222; }

  .ex-body { padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .ex-number { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #222; line-height: 1; min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 1.5px solid #222; border-radius: 50%; cursor: pointer; transition: all 0.2s; flex-shrink: 0; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  .ex-number:active { transform: scale(0.9); }
  .exercise-item.checked-ex .ex-number { background: var(--accent); border-color: var(--accent); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; box-shadow: 0 0 10px rgba(232,255,71,0.25); }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .ex-sets-label { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; }
  .ex-badge { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; padding-top: 2px; }

  /* WEIGHT LOG ROW */
  .weight-log-row { padding: 10px 14px 12px; border-top: 1px solid #161616; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .last-weight-chip { font-size: 10px; color: var(--muted); font-weight: 500; white-space: nowrap; }
  .last-weight-chip.has-weight { color: var(--accent-dim); }
  .last-weight-chip span { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); }
  .weight-input-wrap { display: flex; gap: 6px; flex: 1; min-width: 140px; }
  .weight-input { flex: 1; background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 10px; outline: none; min-width: 0; -webkit-appearance: none; appearance: none; transition: border-color 0.2s; }
  .weight-input::placeholder { color: #2e2e2e; }
  .weight-input:focus { border-color: #333; }
  .weight-input::-webkit-outer-spin-button,.weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .weight-input[type=number] { -moz-appearance: textfield; }
  .btn-log-weight { background: rgba(232,255,71,0.07); border: 1px solid rgba(232,255,71,0.18); border-radius: 8px; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 7px 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; touch-action: manipulation; }
  .btn-log-weight:hover { background: rgba(232,255,71,0.14); border-color: var(--accent); }
  .btn-log-weight:active { transform: scale(0.96); }
  .btn-log-weight.logging { opacity: 0.5; pointer-events: none; }
  .btn-log-weight.logged { background: rgba(232,255,71,0.15); border-color: var(--accent); }

  /* STATS */
  .stats-row { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
  .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; flex: 1; min-width: 80px; }
  .stat-chip span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text); letter-spacing: 0.03em; line-height: 1.1; }

  /* REST PANEL */
  .rest-panel { text-align: center; padding: 60px 20px; border: 1px dashed #1a1a1a; border-radius: 20px; animation: slideIn 0.35s ease; }
  .rest-emoji { font-size: 48px; margin-bottom: 16px; display: block; }

// AUTH
function initAuth() {
  const grid = document.getElementById('userGrid');
  USERS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.innerHTML = `<div class="user-btn-avatar">${u.initials}</div><div class="user-btn-name">${u.name}</div>`;
    btn.addEventListener('click', () => startPIN(u));
    grid.appendChild(btn);
  });
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      const user = USERS.find(u => u.id === saved);
      if (user) { currentUser = user; loadAllUserData().then(showApp); return; }
    }
  } catch(e) {}
  showAuthScreen('userSelectScreen');
}

function startPIN(user) {
  selectedUser = user;
  document.getElementById('pinTitle').textContent = user.name;
  pinInput = '';
  updatePinDots();
  document.getElementById('lockError').textContent = '';
  showAuthScreen('pinScreen');
}

function showAuthScreen(id) {
  ['userSelectScreen','pinScreen'].forEach(sid => document.getElementById(sid).classList.toggle('hidden', sid !== id));
}

let pinInput = '';
const PIN_LEN = 4;

function updatePinDots() {
  document.querySelectorAll('#pinDots .pin-dot').forEach((d,i) => { d.classList.toggle('filled', i < pinInput.length); d.classList.remove('error'); });
}

function tryUnlock() {
  if (pinInput === selectedUser.pin) {
    currentUser = selectedUser;
    try { localStorage.setItem(SESSION_KEY, currentUser.id); } catch(e) {}
    loadAllUserData().then(showApp);
  } else {
    document.querySelectorAll('#pinDots .pin-dot').forEach(d => d.classList.add('error'));
    document.getElementById('lockError').textContent = 'Wrong PIN \u2014 try again';
    setTimeout(() => { pinInput = ''; updatePinDots(); document.getElementById('lockError').textContent = ''; }, 900);
  }
}

document.getElementById('pinPad').addEventListener('click', e => {
  const btn = e.target.closest('.pin-key');
  if (!btn) return;
  const v = btn.dataset.val;
  if (v === 'del')     { pinInput = pinInput.slice(0,-1); updatePinDots(); }
  else if (v === 'go') { if (pinInput.length === PIN_LEN) tryUnlock(); }
  else if (pinInput.length < PIN_LEN) {
    pinInput += v; updatePinDots();
    if (pinInput.length === PIN_LEN) setTimeout(tryUnlock, 200);
  }
});

document.getElementById('backToUsers').addEventListener('click', () => showAuthScreen('userSelectScreen'));
document.getElementById('switchUserBtn').addEventListener('click', () => {
  currentUser = null;
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  document.getElementById('app').style.cssText = 'display:none;';
  showAuthScreen('userSelectScreen');
});

document.addEventListener('keydown', e => {
  if (document.getElementById('pinScreen').classList.contains('hidden')) return;
  if (e.key >= '0' && e.key <= '9' && pinInput.length < PIN_LEN) {
    pinInput += e.key; updatePinDots();
    if (pinInput.length === PIN_LEN) setTimeout(tryUnlock, 200);
  } else if (e.key === 'Backspace') { pinInput = pinInput.slice(0,-1); updatePinDots(); }
  else if (e.key === 'Enter' && pinInput.length === PIN_LEN) tryUnlock();
});

// SHOW APP
function showApp() {
  showAuthScreen('__none__');
  document.getElementById('progressPage').style.display = 'none';
  document.getElementById('navUserName').textContent = currentUser.name;
  document.getElementById('navAvatar').textContent   = currentUser.initials;
  const appEl = document.getElementById('app');
  appEl.style.cssText = 'display:block;opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease;';
  requestAnimationFrame(() => { appEl.style.opacity = '1'; appEl.style.transform = 'translateY(0)'; });
  initApp();
}

    weekHistory = snap.docs.map(d => ({ id: d.id, ...d.data() }));

async function loadWeekTracking() {
  const currentWid = getWeekId();
  const docId = `${currentUser.id}_${currentWid}`;
  try {
    const snap = await getDoc(doc(db, COL_TRACK, docId));
    if (snap.exists()) {
      const data = snap.data();
      tracking = { week: currentWid, completed: data.completed || {}, exercises: data.exercises || {} };
      try { localStorage.setItem(`${TRACK_KEY}_${currentUser.id}`, JSON.stringify(tracking)); } catch(e) {}
      return;
    }
  } catch(e) {}
  try {
    const raw = localStorage.getItem(`${TRACK_KEY}_${currentUser.id}`);
    if (raw) {
      const stored = JSON.parse(raw);
      if (stored.week === currentWid) { tracking = stored; return; }
    }
  } catch(e) {}
  tracking = { week: currentWid, completed: {}, exercises: {} };
}

async function archiveWeek(wid) {
  const trainingDays = days.filter(d => !isRestDay(d));
  const trackDocId   = `${currentUser.id}_${wid}`;
  let completedMap   = {};
  try {
    const snap = await getDoc(doc(db, COL_TRACK, trackDocId));
    if (snap.exists()) completedMap = snap.data().completed || {};
  } catch(e) {}
  const completedCount = trainingDays.filter(d => completedMap[d]).length;
  const logDocId = `${currentUser.id}_${wid}`;
  const entry = {
    userId: currentUser.id, userName: currentUser.name,
    weekId: wid, weekStart: wid,
    completed: { ...completedMap }, completedCount,
    totalTrainingDays: trainingDays.length,
    archivedAt: serverTimestamp(),
  };
  try {
    await setDoc(doc(db, COL_WEEKS, logDocId), entry);
    if (!weekHistory.find(w => w.weekId === wid)) {
      weekHistory.unshift({ ...entry, id: logDocId, archivedAt: null });
      weekHistory.sort((a,b) => (b.weekStart > a.weekStart ? 1 : -1));
    }
  } catch(e) {}
}

function getLastWeight(exerciseName) {
  const log = userWeightLogs.find(l => l.exerciseName === exerciseName);
  return log ? log.weight : null;
}

async function logWeight(exerciseName, day, weight) {
  const entry = { userId: currentUser.id, userName: currentUser.name, exerciseName, day, weight: parseFloat(weight), date: serverTimestamp() };
  const ref = await addDoc(collection(db, COL_WEIGHT), entry);
  userWeightLogs.unshift({ ...entry, id: ref.id, date: { seconds: Date.now()/1000 } });
}

// TRACKING
function getWeekId() {
  const now = new Date();
  const sun = new Date(now);
  sun.setDate(now.getDate() - now.getDay());
  const y = sun.getFullYear();
  const m = String(sun.getMonth() + 1).padStart(2, '0');
  const d = String(sun.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function weekLabel(wid) {
  const [y, m, d] = wid.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  return date.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

async function loadTracking() {
  const currentWid = getWeekId();
  try {
    const q    = query(collection(db, COL_TRACK), where('userId','==',currentUser.id));
    const snap = await getDocs(q);
    for (const d of snap.docs) {
      const data = d.data();
      if (data.weekId && data.weekId !== currentWid) {
        await archiveWeek(data.weekId);
        try { await setDoc(doc(db, COL_TRACK, d.id), { ...data, archived: true }); } catch(e) {}
      }
    }
  } catch(e) {}
  return tracking;
}

let saveTrackingTimer = null;
function saveTracking() {
  try { localStorage.setItem(`${TRACK_KEY}_${currentUser.id}`, JSON.stringify(tracking)); } catch(e) {}
  clearTimeout(saveTrackingTimer);
  saveTrackingTimer = setTimeout(async () => {
    const currentWid = getWeekId();
    const docId = `${currentUser.id}_${currentWid}`;
    try {
      await setDoc(doc(db, COL_TRACK, docId), {
        userId: currentUser.id, userName: currentUser.name,
        weekId: currentWid, completed: tracking.completed,
        exercises: tracking.exercises, updatedAt: serverTimestamp(),
      });
    } catch(e) {}
  }, 800);
}

function isExChecked(day, exId) { return tracking.exercises?.[`${day}-${exId}`] === true; }

function toggleEx(day, exId) {
  const key = `${day}-${exId}`;
  tracking.exercises[key] = !tracking.exercises[key];
  const exs = userPlan[day] || [];
  tracking.completed[day] = exs.length > 0 && exs.every(ex => tracking.exercises[`${day}-${ex.id}`]);
  saveTracking(); updateProgress();
}

function isDayCompleted(day) { return tracking.completed?.[day] === true; }

function markDayComplete(day) {
  const exs = userPlan[day] || [];
  if (!exs.length) return;
  const allChecked = exs.every(ex => isExChecked(day, ex.id));
  const newState = !allChecked;
  exs.forEach(ex => { tracking.exercises[`${day}-${ex.id}`] = newState; });
  tracking.completed[day] = newState;
  saveTracking(); updateProgress();
  if (currentDay === day) selectDay(day);
}

function clearDay(day) {
  const exs = userPlan[day] || [];
  exs.forEach(ex => { tracking.exercises[`${day}-${ex.id}`] = false; });
  tracking.completed[day] = false;
  saveTracking(); updateProgress();
  if (currentDay === day) selectDay(day);
}

function updateDayUI(day) {
  const exs = userPlan[day] || [];
  const n   = exs.filter(ex => isExChecked(day, ex.id)).length;
  const all = n === exs.length && exs.length > 0;
  const doneEl = document.getElementById('doneCount');
  if (doneEl) doneEl.textContent = `${n}/${exs.length}`;
  const cb = document.querySelector('.btn-complete-all');
  if (cb) { cb.classList.toggle('done', all); cb.textContent = all ? '\u2713 Done' : 'All Done'; }
  const clr = document.getElementById('btnClear');
  if (clr) { clr.style.opacity = n>0?'1':'0.3'; clr.style.pointerEvents = n>0?'auto':'none'; }
  tracking.completed[day] = all;
  saveTracking(); updateProgress();
}

// IMAGE DB
const IMG_BASE  = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
const DB_URL    = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/dist/exercises.json";
const CACHE_KEY = "exercise_img_cache_v3b";
let imageMap = {};
let dbReady  = false;

const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
const scoreMatch = (n,q) => {
  const d=norm(n), qn=norm(q);
  if (d===qn) return 100;
  if (d.includes(qn)) return 80;
  const words=qn.split(' '), hit=words.filter(w=>w.length>2 && d.includes(w)).length;
  return Math.round((hit/words.length)*60);
};

function getAllSearchTerms() {
  const terms = new Set(exerciseLibrary.map(e => e.search));
  const plan  = getDefaultPlan();
  Object.values(plan).forEach(exs => exs.forEach(ex => terms.add(ex.search)));
  return terms;
}

async function loadDatabase() {
  const status = document.getElementById('db-status');
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) { imageMap = JSON.parse(cached); dbReady = true; status.classList.add('hidden'); return; }
  } catch(e) {}
  try {
    status.textContent = "Fetching exercise images\u2026";
    const exercises = await (await fetch(DB_URL)).json();
    const withImages = exercises.filter(ex => ex.images && ex.images.length > 0);
    const terms = getAllSearchTerms();
    for (const term of terms) {
      let best=null, bestS=0;
      for (const ex of withImages) {
        const s = scoreMatch(ex.name, term);
        if (s > bestS) { bestS=s; best=ex; }
      }
      if (best) imageMap[term] = IMG_BASE + best.images[0];
    }
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(imageMap)); } catch(e) {}
    dbReady = true; status.textContent = "Images loaded \u2713";
    setTimeout(() => status.classList.add('hidden'), 1200);
    refreshCurrentImages();
  } catch(e) { status.textContent = "Images unavailable"; setTimeout(() => status.classList.add('hidden'), 2500); }
}

const placeholderHTML = `<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="8" width="4" height="8" rx="1"/><rect x="17" y="8" width="4" height="8" rx="1"/><rect x="7" y="10" width="10" height="4" rx="1"/></svg><span>No image</span></div>`;
const loadingHTML     = `<div class="img-loading"><div class="spinner"></div><span>Loading</span></div>`;

function setImage(slot, url) {
  if (!url) { slot.innerHTML = placeholderHTML; return; }
  const img = new Image();
  img.onload = () => { slot.innerHTML=''; slot.appendChild(img); img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.35s ease'; };
  img.onerror = () => { slot.innerHTML = placeholderHTML; };
  img.src = url;
}

function refreshCurrentImages() {
  if (!currentDay) return;

function renderWeeklyTab() {
  const content = document.getElementById('progContent');
  const trainingDays = days.filter(d => !isRestDay(d));
  const TOTAL = trainingDays.length || 1;

  const currentWid = getWeekId();
  const currentEntry = {
    weekId: currentWid, weekStart: currentWid,
    completed: { ...(tracking.completed || {}) },
    completedCount: trainingDays.filter(d => tracking.completed?.[d]).length,
    totalTrainingDays: trainingDays.length, isCurrent: true,
  };

  const allWeeks = [currentEntry, ...weekHistory.filter(w => w.weekId !== currentWid)];
  allWeeks.sort((a,b) => b.weekStart > a.weekStart ? 1 : -1);

  const totalSessions = allWeeks.reduce((s,w) => s + (w.completedCount||0), 0);
  const bestWeek      = allWeeks.reduce((best,w) => Math.max(best, w.completedCount||0), 0);

  let streak = 0;
  const sortedPast = [...allWeeks].filter(w => !w.isCurrent).sort((a,b) => b.weekStart > a.weekStart ? 1 : -1);
  for (const w of sortedPast) {
    if ((w.completedCount||0) === (w.totalTrainingDays||5)) streak++;
    else break;
  }

  const totalSkips = allWeeks.reduce((s,w) => s + ((w.totalTrainingDays||TOTAL) - (w.completedCount||0)), 0);

  let html = '';
  html += `<div class="week-stats-row">
    <div class="week-stat"><div class="week-stat-val">${streak}</div><div class="week-stat-lbl">Streak</div></div>
    <div class="week-stat"><div class="week-stat-val">${totalSessions}</div><div class="week-stat-lbl">Sessions</div></div>
    <div class="week-stat"><div class="week-stat-val">${bestWeek}/${TOTAL}</div><div class="week-stat-lbl">Best Week</div></div>
    <div class="week-stat"><div class="week-stat-val">${totalSkips}</div><div class="week-stat-lbl">Total Skips</div></div>
  </div>`;

  const chartWeeks = [...allWeeks].sort((a,b) => a.weekStart > b.weekStart ? 1 : -1).slice(-10);
  const BAR_W = 28, BAR_GAP = 8, CHART_H = 80, LABEL_H = 28;
  const totalW = chartWeeks.length * (BAR_W + BAR_GAP) - BAR_GAP;

  let bars = '';
  chartWeeks.forEach((w, i) => {
    const tot = w.totalTrainingDays || TOTAL;
    const pct = (w.completedCount||0) / tot;
    const barH = Math.max(4, Math.round(pct * CHART_H));
    const x = i * (BAR_W + BAR_GAP);
    const y = CHART_H - barH;
    const cls = pct === 1 ? 'full' : pct > 0 ? 'partial' : '';
    const label = weekLabel(w.weekStart);
    const pctTxt = pct > 0 ? `${w.completedCount}/${tot}` : '';
    bars += `<rect class="week-chart-bar ${cls}" x="${x}" y="${y}" width="${BAR_W}" height="${barH}" rx="4"/>`;
    if (pct > 0) bars += `<text class="week-chart-pct" x="${x+BAR_W/2}" y="${y-4}">${pctTxt}</text>`;
    bars += `<text class="week-chart-label" x="${x+BAR_W/2}" y="${CHART_H+16}">${label}</text>`;
    if (w.isCurrent) bars += `<rect x="${x}" y="${CHART_H+22}" width="${BAR_W}" height="3" rx="1.5" fill="var(--accent)" opacity="0.5"/>`;
  });

  if (chartWeeks.length > 0) {
    html += `<div class="week-chart-wrap"><div class="week-chart-title">Last ${chartWeeks.length} Weeks</div><svg class="week-chart-svg" viewBox="-4 -12 ${totalW+8} ${CHART_H+LABEL_H+8}" preserveAspectRatio="xMidYMid meet">${bars}</svg></div>`;
  }

  const hasAnySessions = allWeeks.some(w => (w.completedCount||0) > 0);
  if (!hasAnySessions) {
    html += `<div class="prog-table-wrap"><div class="prog-empty"><span class="prog-empty-icon">&#128197;</span><div class="prog-empty-title">NO SESSIONS YET</div><p class="prog-empty-sub">Complete your first training day to start tracking</p></div></div>`;
  } else {
    html += `<div class="week-history-wrap"><table class="week-history-table"><thead><tr><th>Week</th><th>Progress</th><th>Days</th></tr></thead><tbody>`;
    allWeeks.forEach(w => {
      const cnt = w.completedCount || 0;
      const tot = w.totalTrainingDays || TOTAL;
      const cls = cnt === tot ? 'perfect' : cnt >= 3 ? 'good' : 'low';
      const badge = cnt === tot ? '<span class="wh-badge-perfect">PERFECT</span>' : '';
      const label = w.isCurrent ? `${weekLabel(w.weekStart)} <span style="font-size:9px;color:var(--accent);font-weight:700;letter-spacing:.06em;">NOW</span>` : weekLabel(w.weekStart);
      let dots = '';
      days.forEach(d => {
        if (isRestDay(d)) return;
        const done = w.completed?.[d] === true;
        dots += `<div class="wh-day-dot ${done?'done':'skipped'}" title="${d}"></div>`;
      });
      html += `<tr><td class="wh-week">${label}</td><td><span class="wh-score ${cls}">${cnt}/${tot}</span>${badge}</td><td><div class="wh-days">${dots}</div></td></tr>`;
    });
    html += '</tbody></table></div>';
  }
  content.innerHTML = html;
}

async function initApp() {
  await loadTracking();

      const inp = card.querySelector(`#wi-${i}`);
      const val = parseFloat(inp.value);
      if (!val||val<=0||val>500) { inp.style.borderColor='#ff4444'; setTimeout(()=>{inp.style.borderColor='';},1000); return; }
      const btn = card.querySelector(`#bl-${i}`);
      btn.textContent='\u2026'; btn.classList.add('logging');
      try {
        await logWeight(ex.name, day, val);
        card.querySelector(`#lwc-${i}`).className = 'last-weight-chip has-weight';
        card.querySelector(`#lwc-${i}`).innerHTML = `Last: <span>${val}kg</span>`;
        inp.value = '';
        btn.textContent='\u2713'; btn.classList.remove('logging'); btn.classList.add('logged');
        setTimeout(()=>{ btn.textContent='LOG'; btn.classList.remove('logged'); },2200);
      } catch(err) { btn.textContent='ERR'; btn.classList.remove('logging'); setTimeout(()=>{btn.textContent='LOG';},2000); }
    });

    card.querySelector(`#wi-${i}`).addEventListener('keydown', e => { if(e.key==='Enter') card.querySelector(`#bl-${i}`).click(); });
    list.appendChild(card);
    if (dbReady) setImage(card.querySelector(`#${imgId}`), imageMap[ex.search]||null);
  });

  setTimeout(() => display.scrollIntoView({behavior:'smooth',block:'start'}), 120);
}

// EDIT SHEET
function openEditSheet(day) {
  editingDay    = day;
  editPlanCopy  = (userPlan[day] || []).map(ex => ({ ...ex }));
  activeCatTab  = DAY_CATEGORIES[day]?.[0] || 'Chest';

  document.getElementById('editDayTitle').textContent = day;
  document.getElementById('editDayFocus').value = getDayFocus(day);

  renderEditList();
  renderCatTabs();
  renderLibrary();

  document.getElementById('editSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEditSheet(save) {
  if (save) {
    userPlan[editingDay] = editPlanCopy.map(ex => ({ ...ex }));
    saveUserPlan().then(() => { renderDaysGrid(); selectDay(editingDay); });
  }
  document.getElementById('editSheet').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('editBackdrop').addEventListener('click', () => closeEditSheet(false));
document.getElementById('editSaveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('editSaveBtn');
  btn.textContent = 'Saving\u2026'; btn.classList.add('saving');
  userPlan[editingDay] = editPlanCopy.map(ex => ({ ...ex }));
  setDayFocus(editingDay, document.getElementById('editDayFocus').value);
  await saveUserPlan();
  btn.textContent = '\u2713 Saved!';
  setTimeout(() => {
    btn.textContent = 'Save'; btn.classList.remove('saving');
    closeEditSheet(false);
    renderDaysGrid();
    selectDay(editingDay);
  }, 800);
});

const editPanel   = document.getElementById('editPanel');
const editDragBar = document.getElementById('editDragBar');
let sheetStartY   = 0;

editDragBar.addEventListener('touchstart', e => {
  sheetStartY = e.touches[0].clientY;
  editPanel.style.transition = 'none';
}, { passive: true });

editDragBar.addEventListener('touchmove', e => {
  const diff = Math.max(0, e.touches[0].clientY - sheetStartY);
  editPanel.style.transform = `translateY(${diff}px)`;
}, { passive: true });

editDragBar.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - sheetStartY;
  editPanel.style.transition = '';
  if (diff > 100) { closeEditSheet(false); editPanel.style.transform = ''; }
  else            { editPanel.style.transform = ''; }
});

function renderEditList() {
  const listEl = document.getElementById('editExList');
  listEl.innerHTML = '';
  if (!editPlanCopy.length) {
    listEl.innerHTML = `<div class="edit-empty">No exercises yet \u2014 add some below \u2193</div>`;
    return;
  }
  editPlanCopy.forEach((ex, i) => {
    const item = document.createElement('div');
    item.className = 'edit-ex-item';
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="edit-ex-info">
        <div class="edit-ex-name">${ex.name}</div>
        <div class="edit-ex-cat">${ex.category}</div>
      </div>
      <div class="edit-ex-controls">
        <div class="sets-stepper">
          <button class="sets-btn" data-action="dec">\u2212</button>
          <div class="sets-val">${ex.sets}</div>
          <button class="sets-btn" data-action="inc">+</button>
        </div>
        <span style="font-size:11px;color:var(--muted);">\u00D7</span>
        <input class="reps-input" value="${ex.reps}" placeholder="reps">
      </div>
      <button class="edit-ex-x">\u2715</button>`;
    item.querySelectorAll('.sets-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const idx = parseInt(item.dataset.idx);
        let sets  = parseInt(editPlanCopy[idx].sets) || 3;
        if (btn.dataset.action==='inc' && sets < 8) sets++;
        else if (btn.dataset.action==='dec' && sets > 1) sets--;
        editPlanCopy[idx].sets = String(sets);
        item.querySelector('.sets-val').textContent = sets;
      });
    });
    item.querySelector('.reps-input').addEventListener('input', e => {
      editPlanCopy[parseInt(item.dataset.idx)].reps = e.target.value;
    });
    item.querySelector('.edit-ex-x').addEventListener('click', e => {
      e.stopPropagation();
      editPlanCopy.splice(parseInt(item.dataset.idx), 1);
      renderEditList();
      renderLibrary();
    });
    listEl.appendChild(item);
  });
  initDragSort(listEl);
}

function renderCatTabs() {
  const allCats = ['Chest','Back','Shoulders','Legs','Arms','Abs','Glutes','Cardio'];
  const dayCats = DAY_CATEGORIES[editingDay] || allCats;
  const ordered = [...dayCats, ...allCats.filter(c => !dayCats.includes(c))];
  const tabsEl = document.getElementById('editCatTabs');
  tabsEl.innerHTML = '';
  ordered.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'edit-cat-tab' + (cat===activeCatTab?' active':'');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeCatTab = cat;
      tabsEl.querySelectorAll('.edit-cat-tab').forEach(t => t.classList.toggle('active', t.textContent===cat));
      renderLibrary();
    });
    tabsEl.appendChild(btn);
  });
}

function renderLibrary() {
  const libEl = document.getElementById('editLibrary');
  libEl.innerHTML = '';
  const addedIds = new Set(editPlanCopy.map(e => e.id));
  const filtered = exerciseLibrary.filter(e => e.category === activeCatTab);
  filtered.forEach(ex => {
    const item = document.createElement('div');
    item.className = 'lib-item' + (addedIds.has(ex.id)?' already-added':'');
    item.innerHTML = `
      <div class="lib-item-info">
        <div class="lib-item-name">${ex.name}</div>
        <div class="lib-item-cat">${ex.category}</div>
      </div>
      <div class="lib-item-plus">${addedIds.has(ex.id)?'\u2713':'+'}</div>`;
    if (!addedIds.has(ex.id)) {
      item.addEventListener('click', () => {
        const def = CAT_DEFAULTS[ex.category] || { sets:'3', reps:'10\u201312' };
        editPlanCopy.push({ id:ex.id, name:ex.name, search:ex.search, category:ex.category, sets:def.sets, reps:def.reps });
        renderEditList();
        renderLibrary();
      });
    }
    libEl.appendChild(item);
  });
}

function initDragSort(listEl) {
  let dragEl = null;
  let offsetY = 0;
  function getItems() { return [...listEl.querySelectorAll('.edit-ex-item')]; }
  function targetSlot(touchY) {
    const items = getItems().filter(el => el !== dragEl);
    for (const item of items) {
      const r = item.getBoundingClientRect();
      if (touchY < r.top + r.height / 2) return { before: item };
    }
    return { before: null };
  }
  listEl.addEventListener('touchstart', e => {
    if (dragEl) return;
    if (!e.target.closest('.drag-handle')) return;
    const target = e.target.closest('.edit-ex-item');
    if (!target) return;
    dragEl = target;
    const touch = e.touches[0];
    const rect  = dragEl.getBoundingClientRect();
    offsetY = touch.clientY - rect.top;
    dragEl.classList.add('is-dragging');
    e.preventDefault();
  }, { passive: false });
  listEl.addEventListener('touchmove', e => {
    if (!dragEl) return;
    e.preventDefault();
    const touchY = e.touches[0].clientY;
    const { before } = targetSlot(touchY);
    if (before) { if (dragEl.nextSibling !== before) listEl.insertBefore(dragEl, before); }
    else { if (listEl.lastElementChild !== dragEl) listEl.appendChild(dragEl); }
  }, { passive: false });
  function endDrag() {
    if (!dragEl) return;
    dragEl.classList.remove('is-dragging');
    const newOrder = [];
    getItems().forEach(item => {
      const idx = parseInt(item.dataset.idx);
      if (!isNaN(idx) && editPlanCopy[idx]) newOrder.push({ ...editPlanCopy[idx] });
    });
    editPlanCopy.length = 0;
    newOrder.forEach(ex => editPlanCopy.push(ex));
    dragEl = null;
    renderEditList();
  }
  listEl.addEventListener('touchend', endDrag);
  listEl.addEventListener('touchcancel', () => { if (dragEl) { dragEl.classList.remove('is-dragging'); dragEl = null; renderEditList(); } });
}
